apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inventory-to-mongo
  labels:
    app.kubernetes.io/part-of: rxpulse
    app.kubernetes.io/managed-by: Helm
spec:
  podSelector:
    matchLabels:
      app: mongo-inventory
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - inventory-service
                  - inventory-seed
