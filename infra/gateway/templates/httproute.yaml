apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rxpulse-routes
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/part-of: rxpulse
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.user.path }}
      backendRefs:
        - name: {{ .Values.routes.user.service }}
          port: {{ .Values.routes.user.port }}

    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.catalog.path }}
      backendRefs:
        - name: {{ .Values.routes.catalog.service }}
          port: {{ .Values.routes.catalog.port }}

    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.inventory.path }}
      backendRefs:
        - name: {{ .Values.routes.inventory.service }}
          port: {{ .Values.routes.inventory.port }}

    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.frontend.path }}
      backendRefs:
        - name: {{ .Values.routes.frontend.service }}
          port: {{ .Values.routes.frontend.port }}
